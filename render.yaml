services:
  - type: web
    name: safety-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://safety-frontend.onrender.com

  - type: web
    name: safety-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve dist -l 10000
    envVars:
      - key: VITE_API_URL
        value: https://safety-backend.onrender.com
